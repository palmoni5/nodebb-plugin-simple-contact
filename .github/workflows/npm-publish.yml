name: Publish to npm on version bump

# Runs on every push to the default branch. If the version in package.json is
# not yet on the npm registry, it publishes the package. Bump the version in a
# commit and this workflow does the rest. Requires an NPM_TOKEN repository (or
# organization) secret; without it the publish step is skipped, not failed.

on:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Determine if this version needs publishing
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "Package: $NAME@$VERSION"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "Version already on npm - nothing to do."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version not on npm - will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify NPM_TOKEN is configured
        id: token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "set=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::NPM_TOKEN secret is not set - skipping publish."
            echo "set=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true' && steps.token.outputs.set == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
